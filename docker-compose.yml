services:
  backend:
    build: .
    env_file:
      - ./infra/backend.env
    volumes:
      - codexa_data:/app/.codexa
    expose:
      - "8000"
    restart: always

  client:
    build:
      context: ./codexa-ui
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    expose:
      - "3000"
    restart: always

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file:
      - ./infra/caddy.env
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - client
    restart: always

volumes:
  codexa_data:
  caddy_data:
  caddy_config:
